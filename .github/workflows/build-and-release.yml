name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许创建 release 和推送 tag

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            spec_file: run_ui.spec
            exe_base: Yakutan
            install_local_asr: false
          - variant: local-asr
            spec_file: run_ui_local_asr.spec
            exe_base: Yakutan-LocalASR
            install_local_asr: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        if ("${{ matrix.install_local_asr }}" -eq "true") {
          pip install -r requirements-local-asr.txt
        }
        pip install pyinstaller
    
    - name: Prefetch Silero/SenseVoice, Qwen vendor, llama.cpp (Vulkan DLLs), and Qwen ONNX+GGUF
      if: matrix.variant == 'local-asr'
      run: |
        python -c "from local_asr.model_manager import apply_cache_env, download_silero, download_qwen3_asr, ensure_vendor_sources, prefetch_llama_cpp_vulkan_for_pyinstaller_bundle, prefetch_sensevoice_for_pyinstaller_bundle; apply_cache_env(); download_silero(); prefetch_sensevoice_for_pyinstaller_bundle(); ensure_vendor_sources('qwen3-asr'); prefetch_llama_cpp_vulkan_for_pyinstaller_bundle(); download_qwen3_asr()"
    
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --clean --noconfirm "${{ matrix.spec_file }}"
    
    - name: Get commit info and package artifacts
      id: commit_info
      run: |
        $commitSha = "${{ github.sha }}".Substring(0, 7)
        $commitMsg = git log -1 --pretty=%B
        $commitDate = git log -1 --date=format:%Y%m%d-%H%M%S --pretty=%cd
        $variant = "${{ matrix.variant }}"
        $tag = "v$commitDate-$commitSha"
        echo "sha=$commitSha" >> $env:GITHUB_OUTPUT
        echo "message=$commitMsg" >> $env:GITHUB_OUTPUT
        echo "commit_date=$commitDate" >> $env:GITHUB_OUTPUT
        echo "tag=$tag" >> $env:GITHUB_OUTPUT
        if ($variant -eq 'standard') {
          $exeName = "Yakutan-$commitDate.exe"
          Rename-Item -Path "./dist/Yakutan.exe" -NewName $exeName
        } else {
          $dir = Join-Path "./dist" "Yakutan-LocalASR"
          if (-not (Test-Path $dir)) { throw "PyInstaller onedir 输出不存在: $dir" }
          $exeName = "Yakutan-LocalASR-$commitDate.zip"
          Compress-Archive -Path $dir -DestinationPath (Join-Path "./dist" $exeName) -Force
          # 与打包版 exe 同目录布局一致：local_asr_models/qwen3-asr（见 resource_path.get_user_data_path）
          $qwenSrc = Join-Path "." "local_asr/models/qwen3-asr"
          if (-not (Test-Path $qwenSrc)) { throw "缺少 Qwen3-ASR 模型目录: $qwenSrc" }
          foreach ($f in @(
            "qwen3_asr_encoder_frontend.int4.onnx",
            "qwen3_asr_encoder_backend.int4.onnx",
            "qwen3_asr_llm.q4_k.gguf"
          )) {
            if (-not (Test-Path (Join-Path $qwenSrc $f))) { throw "缺少 Qwen 模型文件: $f" }
          }
          $qwenZip = "Yakutan-Qwen3-ASR-models-$commitDate.zip"
          $stageRoot = Join-Path "./dist" "_qwen_pack_layout"
          $qwenDest = Join-Path $stageRoot "local_asr_models/qwen3-asr"
          New-Item -ItemType Directory -Path $qwenDest -Force | Out-Null
          Copy-Item -Path (Join-Path $qwenSrc "*") -Destination $qwenDest -Force
          $qwenBinSrc = Join-Path "." "local_asr/models/qwen_llama_vulkan_bin"
          if (-not (Test-Path $qwenBinSrc)) { throw "缺少 Qwen Vulkan DLL 目录: $qwenBinSrc" }
          foreach ($f in @("llama.dll", "ggml.dll", "ggml-base.dll")) {
            if (-not (Test-Path (Join-Path $qwenBinSrc $f))) { throw "缺少 llama Vulkan DLL: $f" }
          }
          $qwenBinDest = Join-Path $stageRoot "local_asr_models/qwen_llama_vulkan_bin"
          New-Item -ItemType Directory -Path $qwenBinDest -Force | Out-Null
          Copy-Item -Path (Join-Path $qwenBinSrc "*") -Destination $qwenBinDest -Force
          $archiveRoot = Join-Path $stageRoot "local_asr_models"
          Compress-Archive -Path $archiveRoot -DestinationPath (Join-Path "./dist" $qwenZip) -Force
          Remove-Item -Recurse -Force $stageRoot
          echo "qwen_models_zip=$qwenZip" >> $env:GITHUB_OUTPUT
        }
        echo "exe_name=$exeName" >> $env:GITHUB_OUTPUT
    
    - name: Create Release (standard)
      if: matrix.variant == 'standard'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.commit_info.outputs.tag }}
        name: Yakutan ${{ steps.commit_info.outputs.tag }}
        body: |
          ## 自动构建版本
          
          **提交信息**: ${{ steps.commit_info.outputs.message }}
          **提交日期**: ${{ steps.commit_info.outputs.commit_date }}
          **提交 SHA**: ${{ steps.commit_info.outputs.sha }}
          
          **构建产物**:
          - `Yakutan-*.exe`: 标准版单文件
          - `Yakutan-LocalASR-*.zip`: 本地识别版（onedir）；内置 Silero、SenseVoice INT8、Qwen 推理 Python 胶水代码与 pip 依赖（**Qwen 用 Vulkan DLL 与权重见下方资源包 / UI 下载**）
          - `Yakutan-Qwen3-ASR-models-*.zip`: （与本 tag 一并发布）Qwen3 资源包：**ONNX×2 + GGUF** 与 **llama.cpp Vulkan DLL**；将压缩包内 **`local_asr_models` 文件夹** 解压到 **`Yakutan-LocalASR.exe` 所在目录**（与 exe 同级），即可离线使用 Qwen3-ASR；选用 SenseVoice 时可不下载此包
        files: ./dist/${{ steps.commit_info.outputs.exe_name }}
        draft: true
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Release (local-asr)
      if: matrix.variant == 'local-asr'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.commit_info.outputs.tag }}
        name: Yakutan ${{ steps.commit_info.outputs.tag }}
        body: |
          ## 自动构建版本
          
          **提交信息**: ${{ steps.commit_info.outputs.message }}
          **提交日期**: ${{ steps.commit_info.outputs.commit_date }}
          **提交 SHA**: ${{ steps.commit_info.outputs.sha }}
          
          **构建产物**:
          - `Yakutan-*.exe`: 标准版单文件
          - `Yakutan-LocalASR-*.zip`: 本地识别版（onedir）；内置 Silero、SenseVoice INT8、Qwen 推理 Python 胶水代码与 pip 依赖（**Qwen 用 Vulkan DLL 与权重见下方资源包 / UI 下载**）
          - `Yakutan-Qwen3-ASR-models-*.zip`: （与本 tag 一并发布）Qwen3 资源包：**ONNX×2 + GGUF** 与 **llama.cpp Vulkan DLL**；将压缩包内 **`local_asr_models` 文件夹** 解压到 **`Yakutan-LocalASR.exe` 所在目录**（与 exe 同级），即可离线使用 Qwen3-ASR；选用 SenseVoice 时可不下载此包
        files: |
          ./dist/${{ steps.commit_info.outputs.exe_name }}
          ./dist/${{ steps.commit_info.outputs.qwen_models_zip }}
        draft: true
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifact (standard)
      if: matrix.variant == 'standard'
      uses: actions/upload-artifact@v4
      with:
        name: Yakutan-${{ matrix.variant }}
        path: ./dist/${{ steps.commit_info.outputs.exe_name }}
        retention-days: 30
    
    - name: Upload artifact (local-asr)
      if: matrix.variant == 'local-asr'
      uses: actions/upload-artifact@v4
      with:
        name: Yakutan-${{ matrix.variant }}
        path: |
          ./dist/${{ steps.commit_info.outputs.exe_name }}
          ./dist/${{ steps.commit_info.outputs.qwen_models_zip }}
        retention-days: 30
