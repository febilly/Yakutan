name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write  # 允许创建 release 和推送 tag

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: standard
            spec_file: run_ui.spec
            exe_base: Yakutan
            install_local_asr: false
          - variant: local-asr
            spec_file: run_ui_local_asr.spec
            exe_base: Yakutan-LocalASR
            install_local_asr: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        if ("${{ matrix.install_local_asr }}" -eq "true") {
          pip install -r requirements-local-asr.txt
        }
        pip install pyinstaller
    
    - name: Prefetch Silero VAD into bundle tree
      if: matrix.variant == 'local-asr'
      run: |
        python -c "from local_asr.model_manager import apply_cache_env, download_silero; apply_cache_env(); download_silero()"
    
    - name: Build executable with PyInstaller
      run: |
        pyinstaller --clean --noconfirm "${{ matrix.spec_file }}"
    
    - name: Get commit info and package artifacts
      id: commit_info
      run: |
        $commitSha = "${{ github.sha }}".Substring(0, 7)
        $commitMsg = git log -1 --pretty=%B
        $commitDate = git log -1 --date=format:%Y%m%d-%H%M%S --pretty=%cd
        $variant = "${{ matrix.variant }}"
        $tag = "v$commitDate-$commitSha"
        echo "sha=$commitSha" >> $env:GITHUB_OUTPUT
        echo "message=$commitMsg" >> $env:GITHUB_OUTPUT
        echo "commit_date=$commitDate" >> $env:GITHUB_OUTPUT
        echo "tag=$tag" >> $env:GITHUB_OUTPUT
        if ($variant -eq 'standard') {
          $exeName = "Yakutan-$commitDate.exe"
          Rename-Item -Path "./dist/Yakutan.exe" -NewName $exeName
        } else {
          $dir = Join-Path "./dist" "Yakutan-LocalASR"
          if (-not (Test-Path $dir)) { throw "PyInstaller onedir 输出不存在: $dir" }
          $exeName = "Yakutan-LocalASR-$commitDate.zip"
          Compress-Archive -Path $dir -DestinationPath (Join-Path "./dist" $exeName) -Force
        }
        echo "exe_name=$exeName" >> $env:GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.commit_info.outputs.tag }}
        name: Yakutan ${{ steps.commit_info.outputs.tag }}
        body: |
          ## 自动构建版本
          
          **提交信息**: ${{ steps.commit_info.outputs.message }}
          **提交日期**: ${{ steps.commit_info.outputs.commit_date }}
          **提交 SHA**: ${{ steps.commit_info.outputs.sha }}
          
          **构建产物**:
          - `Yakutan-*.exe`: 标准版单文件
          - `Yakutan-LocalASR-*.zip`: 本地识别版文件夹打包（解压后运行目录内 `Yakutan-LocalASR.exe`）；内置 Silero VAD；语音识别主模型仍需首次下载
        files: ./dist/${{ steps.commit_info.outputs.exe_name }}
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Yakutan-${{ matrix.variant }}
        path: ./dist/${{ steps.commit_info.outputs.exe_name }}
        retention-days: 30
